<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Freelance Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-group {
      margin-bottom: 28px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap span {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 16px;
      font-weight: 500;
    }

    input[type="number"] {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      padding: 12px 14px 12px 30px;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    input[type="number"]:focus {
      border-color: #555;
    }

    .breakdown {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
    }

    .row .label {
      font-size: 14px;
      color: #aaa;
    }

    .row .label .badge {
      display: inline-block;
      background: #2a2a2a;
      color: #888;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
    }

    .row .value {
      font-size: 14px;
      font-weight: 500;
      color: #e8e8e8;
    }

    .row .value.deduction {
      color: #ff6b6b;
    }

    .divider {
      height: 1px;
      background: #2a2a2a;
      margin: 4px 0;
    }

    .rate-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0 10px;
    }

    .rate-row .label {
      font-size: 13px;
      color: #888;
    }

    .rate-input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 5px 10px;
    }

    .rate-input-wrap span {
      font-size: 12px;
      color: #666;
    }

    .rate-input-wrap input {
      width: 52px;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 0;
      text-align: right;
      outline: none;
      -moz-appearance: textfield;
    }

    .rate-input-wrap input::-webkit-outer-spin-button,
    .rate-input-wrap input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .result-usd {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 0 10px;
    }

    .result-usd .label {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .result-usd .value {
      font-size: 20px;
      font-weight: 700;
      color: #4ade80;
    }

    .result-inr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1f2b1f;
      border: 1px solid #2d3d2d;
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 4px;
    }

    .result-inr .label {
      font-size: 14px;
      color: #7db87d;
    }

    .result-inr .value {
      font-size: 20px;
      font-weight: 700;
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>💰 Freelance Calculator</h1>

    <div class="input-group">
      <label>Project Amount</label>
      <div class="input-wrap">
        <span>$</span>
        <input type="number" id="amount" placeholder="0" min="0" step="any" />
      </div>
    </div>

    <div class="breakdown">

      <div class="row">
        <span class="label">Gross Amount</span>
        <span class="value" id="gross">$0.00</span>
      </div>

      <div class="row">
        <span class="label">Upwork Fees & Tax <span class="badge">11%</span></span>
        <span class="value deduction" id="upwork-fee">-$0.00</span>
      </div>

      <div class="divider"></div>

      <div class="row">
        <span class="label">After Upwork</span>
        <span class="value" id="after-upwork">$0.00</span>
      </div>

      <div class="row">
        <span class="label">Agency Fees <span class="badge">25%</span></span>
        <span class="value deduction" id="agency-fee">-$0.00</span>
      </div>

      <div class="divider"></div>

      <div class="rate-row">
        <span class="label">USD → INR Rate</span>
        <div class="rate-input-wrap">
          <input type="number" id="rate" value="90" min="1" step="any" />
          <span>₹ / $</span>
        </div>
      </div>

      <div class="result-usd">
        <span class="label">💵 You Receive (USD)</span>
        <span class="value" id="final-usd">$0.00</span>
      </div>

      <div class="result-inr">
        <span class="label">🇮🇳 You Receive (INR)</span>
        <span class="value" id="final-inr">₹0</span>
      </div>

    </div>
  </div>

  <script>
    const amountInput = document.getElementById('amount');
    const rateInput   = document.getElementById('rate');

    function fmt(n) {
      return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function calc() {
      const gross = parseFloat(amountInput.value) || 0;
      const rate  = parseFloat(rateInput.value)   || 90;

      const upworkFee   = gross * 0.11;
      const afterUpwork = gross - upworkFee;
      const agencyFee   = afterUpwork * 0.25;
      const finalUSD    = afterUpwork - agencyFee;
      const finalINR    = finalUSD * rate;

      document.getElementById('gross').textContent       = `$${fmt(gross)}`;
      document.getElementById('upwork-fee').textContent  = `-$${fmt(upworkFee)}`;
      document.getElementById('after-upwork').textContent = `$${fmt(afterUpwork)}`;
      document.getElementById('agency-fee').textContent  = `-$${fmt(agencyFee)}`;
      document.getElementById('final-usd').textContent   = `$${fmt(finalUSD)}`;
      document.getElementById('final-inr').textContent   = `₹${Math.round(finalINR).toLocaleString('en-IN')}`;
    }

    amountInput.addEventListener('input', calc);
    rateInput.addEventListener('input', calc);
  </script>
</body>
</html>
